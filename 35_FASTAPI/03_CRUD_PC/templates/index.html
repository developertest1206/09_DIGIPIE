<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>User Information</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

  <h2>Add User</h2>

  <!-- ✅ FORM (IMPORTANT: name attribute added) -->
  <form method="POST" action="/">

    <div class="mb-3">
      <label>Name</label>
      <label>
        <input type="text" name="name" class="form-control" required>
      </label>
    </div>

    <div class="mb-3">
      <label>Email</label>
      <label>
        <input type="email" name="email" class="form-control" required>
      </label>
    </div>

    <div class="mb-3">
      <label>Age</label>
      <label>
        <input type="number" name="age" class="form-control" required>
      </label>
    </div>

    <button type="submit" class="btn btn-primary">Submit</button>
  </form>

  <hr>

  <!-- ✅ SHOW DATA -->
  <h3>All Users</h3>

  <table class="table table-bordered mt-3">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Age</th>
      </tr>
    </thead>

    <tbody>
      {% for user in newdocs %}
      <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.age }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

</div>

</body>
</html>
